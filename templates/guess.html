<!DOCTYPE html>
<html>
<head>
    <title>Guess the Number!</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
    body{
        margin:0;
        height:100vh;

        background-image:url("/static/nbg.jpg");
        background-size: cover;
        background-position:center;

        font-family:'Orbitron', sans-serif;
        color:white;

        display:flex;
        flex-direction: column;
        align-items:center;
    }

    h1{
        margin-top:22vh;
        font-size:50px;
        text-shadow:0 0 15px white;
    }

    .guessBox{
        margin-top:40px;

        background:white;
        border-radius:40px;

        width:420px;
        height:60px;

        display:flex;
        align-items:center;

        padding-left:15px;
    }

    .guessBox input{
        border:none;
        outline:none;

        font-size:22px;

        width:80%;
    }

    .guessBox button{
        width:60px;
        height:45px;

        border:none;
        border-radius:12px;

        cursor:pointer;

        background:linear-gradient(135deg,#000000, #651f7b);

        color:white;
        font-size:24px;

        margin-left:auto;
        margin-right:8px;
    }

    .menu{
        margin-top:auto;
        margin-bottom:30px;
    }

    .menu button{
        font-family:'Orbitron',sans-serif;

        padding:10px 20px;
        font-size:18px;

        cursor:pointer;
    }

    .result{
        margin-top:35px;
        font-size:22px;
    }
</style>
</head>
<body>
    <h1>Guess the Number!</h1>

    <form method="POST">
        <div class="guessBox">
            <input type="number" name="user_guess" placeholder="Enter a number..." required>
            <button type="submit">➜</button>
        </div>
    </form>

    {% if result %}
    <div class="result">
        {{ result}}
    </div>
    {% endif %}

    <div class="menu">
        <button onclick="location.href='/'">Back to Menu</button>
    </div>
</body>
</html>
