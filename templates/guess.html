<!DOCTYPE html>
<html>
<head>
    <title>Guess the Number!</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    min-height:100vh;

    background-image:url("/static/nbg.jpg");
    background-size:cover;
    background-position:center;

    font-family:'Orbitron', sans-serif;
    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    font-size:50px;
    text-shadow:0 0 15px white;
    margin-bottom:30px;
}

.guessBox{
    margin-top:20px;

    background:white;
    border-radius:40px;

    width:90%;
    max-width:420px;
    height:60px;

    display:flex;
    align-items:center;

    padding-left:15px;
}

.guessBox input{
    border:none;
    outline:none;

    font-size:22px;
    width:80%;
}

.guessBox button{
    width:60px;
    height:45px;

    border:none;
    border-radius:12px;

    cursor:pointer;

    background:linear-gradient(135deg,#000000,#651f7b);

    color:white;
    font-size:24px;

    margin-left:auto;
    margin-right:8px;
}

.result{
    margin-top:25px;
    font-size:22px;
}

.menu{
    margin-top:30px;
}

.menu button{
    font-family:'Orbitron',sans-serif;

    padding:12px 25px;
    font-size:20px;

    cursor:pointer;
}
</style>
</head>
<body>
    <h1>Guess the Number!</h1>

    <form method="POST">
        <div class="guessBox">
            <input type="number" name="user_guess" placeholder="Enter a number..." required>
            <button type="submit">➜</button>
        </div>
    </form>

    {% if result %}
    <div class="result">
        {{ result}}
    </div>
    {% endif %}

    <div class="menu">
        <button onclick="location.href='/'">Back to Menu</button>
    </div>
</body>
</html>
