<!DOCTYPE html>
<html>
<head>

<title>Hangman</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;

    font-family:'Orbitron',sans-serif;
    color:white;

    background-image:url("/static/hbg.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* MAIN GAME BOX */
.gameArea{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* TITLE */
h1{
    font-size:clamp(36px,6vw,50px);
    margin-bottom:10px;
}

.subtitle{
    font-size:18px;
    margin-bottom:30px;
}

/* WORD DISPLAY */
.word{
    font-size:clamp(28px,5vw,40px);
    letter-spacing:10px;
    margin-bottom:30px;
}

/* INPUT BOX */
.inputBox{
    background:white;
    border-radius:40px;

    width:min(350px,85vw);
    height:55px;

    display:flex;
    align-items:center;

    padding-left:15px;
    margin-bottom:20px;
}

.inputBox input{
    border:none;
    outline:none;

    font-size:22px;
    width:80%;
}

.inputBox button{
    width:60px;
    height:40px;

    border:none;
    border-radius:12px;

    cursor:pointer;

    background:linear-gradient(135deg,#000,#7a00ff);
    color:white;
    font-size:22px;

    margin-left:auto;
    margin-right:8px;
}

/* TEXT INFO */
.info{
    margin-top:10px;
    font-size:18px;
}

.message{
    margin-top:20px;
    font-size:26px;
}

/* MENU */
.menu{
    margin-top:30px;
}

.menu button{
    font-family:'Orbitron',sans-serif;
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="gameArea">

    <h1>Hangman</h1>

    <div class="subtitle">
        Use Capital Letters
    </div>

    <div class="word">
        {{ display_word }}
    </div>

    {% if message %}

        <div class="message">
            {{ message }}
        </div>

        <button onclick="location.href='/hangman'">Play Again</button>

    {% else %}

        <form method="POST">

            <div class="inputBox">

                <input type="text" name="letter" maxlength="1" placeholder="Enter letter..." required>

                <button type="submit">➜</button>

            </div>

        </form>

    {% endif %}

    <div class="info">
        Wrong guesses: {{ wrong_guesses }} / 6
    </div>

    <div class="info">
        Guessed letters: {{ guessed_letters|join(', ') }}
    </div>

    <div class="menu">
        <button onclick="location.href='/'">Back to Menu</button>
    </div>

</div>

</body>
</html>
