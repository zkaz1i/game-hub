<!DOCTYPE html>
<html>
<head>

<title>Rock Paper Scissors</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;

    background-image:url("/static/rpsbg.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    font-family:'Orbitron',sans-serif;
    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
}

h1{
    font-size:clamp(36px,6vw,50px);
    text-shadow:0 0 15px white;
}

.subtitle{
    margin-top:10px;
    font-size:clamp(16px,3vw,20px);
}

.choices{
    margin-top:40px;

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.choices button{

    font-family:'Orbitron',sans-serif;

    padding:18px 35px;
    margin:10px;

    font-size:20px;

    border-radius:14px;

    cursor:pointer;

    color:white;

    border:2px solid #00e5ff;

    background:linear-gradient(270deg,#00b7ff,#7a00ff,#00b7ff);
    background-size:400% 400%;

    animation:gradientMove 6s ease infinite;

    box-shadow:0 0 10px #00e5ff;

    width:min(200px,80vw);
}

.choices button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #00e5ff;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.result{
    margin-top:35px;
    font-size:26px;
}

.menu{
    margin-top:35px;
}

.menu button{
    font-family:'Orbitron',sans-serif;
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>Rock Paper Scissors</h1>

<div class="subtitle">
Pick your choice! Rock, Paper, or Scissors?
</div>

<form method="POST">

<div class="choices">

<button type="submit" name="choice" value="rock">Rock</button>

<button type="submit" name="choice" value="paper">Paper</button>

<button type="submit" name="choice" value="scissors">Scissors</button>

</div>

</form>

{% if result %}
<div class="result">
{{ result }}
</div>
{% endif %}

<div class="menu">
<button onclick="location.href='/'">Back to Menu</button>
</div>

</body>
</html>
