<!DOCTYPE html>
<html>

<head>
    <title>Game Break</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rubik:wght@400;600&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Rubik', sans-serif;

            background-image:url("/static/background.jpg");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            height:100vh;
            margin:0;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            text-align:center;
        }

        @keyframes gradientMove {
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        h1{
            font-family:'Orbitron', sans-serif;
            font-size:clamp(42px,8vw,70px);
            color:black;

            margin-bottom:50px;

            letter-spacing:4px;

            text-shadow:
                0 0 10px #fff,
                0 0 20px #0ff,
                0 0 40px #0ff;
        }

        button{
            font-size:22px;
            padding:18px 50px;
            margin:12px;

            width:260px;
            max-width:80vw;

            color:black;
            border:3px solid black;
            border-radius:14px;

            background-image:linear-gradient(270deg,#ff6ec4,#7873f5,#4facfe);
            background-size:300% 300%;

            cursor:pointer;

            box-shadow:
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                inset 0 0 10px rgba(255,255,255,0.3);

            opacity:0;
            transform:translateY(120px);

            animation:flyUp 0.8s forwards, gradientMove 5s ease infinite;
        }

        button:nth-of-type(1){animation-delay:0.2s;}
        button:nth-of-type(2){animation-delay:0.4s;}
        button:nth-of-type(3){animation-delay:0.6s;}

        button:hover{
            transform:scale(1.1);
            background-image:linear-gradient(45deg,#36d1dc,#5b86e5);
        }

        @keyframes flyUp{
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>
</head>

<body>

    <h1>Game Break</h1>

    <button onclick="location.href='/guess'">Guess the Number!</button>

    <button onclick="location.href='/rps'">Rock Paper Scissor</button>

    <button onclick="location.href='/hangman'">Hangman</button>

</body>
</html>
